name: Build with Gulp

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Gulp Build
        run: npx gulp build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: site-build
          path: dist
